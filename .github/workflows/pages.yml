name: publish public viewer

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "graz_protocols/**"
      - "requirements.txt"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build public data from DIGRA
        run: |
          mkdir -p public_work public
          python -m graz_protocols.cli city-assets \
            --output public_work/city_archive_assets.json
          python -m graz_protocols.cli digra-sync \
            --limit 60 \
            --output public_work/records.jsonl \
            --summary public_work/summary.json \
            --sqlite public_work/eintraege.sqlite \
            --city-archive-links \
            --city-archive-assets \
            --city-archive-assets-index public_work/city_archive_assets.json

      - name: Add local summaries
        run: |
          python -m graz_protocols.cli summaries \
            --records public_work/records.jsonl \
            --output public_work/records_ai.jsonl

      - name: Build topics
        run: |
          python -m graz_protocols.cli topics \
            --records public_work/records_ai.jsonl \
            --output public_work/topics.json

      - name: Smoke-test local no-cost answer
        run: |
          python -m graz_protocols.cli answer \
            "Was ist zu Anrainerparken beschlossen?" \
            --sqlite public_work/eintraege.sqlite \
            --limit 20 \
            > public_work/answer_smoke.txt

      - name: Build static viewer
        run: |
          python -m graz_protocols.viewer \
            --records public_work/records_ai.jsonl \
            --summary public_work/summary.json \
            --topics public_work/topics.json \
            --output public/index.html
          touch public/.nojekyll

      - name: Smoke-test public parking routing
        run: |
          grep -q "parkingRouteStart" public/index.html
          grep -q "router.project-osrm.org/route/v1/driving" public/index.html
          grep -q "OpenStreetMap/Nominatim und OSRM" public/index.html

      - name: Publish gh-pages branch
        run: |
          set -euo pipefail
          mkdir -p /tmp/graz-pages
          cp -a public/. /tmp/graz-pages/
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch --force-create gh-pages origin/gh-pages
          else
            git switch --orphan gh-pages
          fi
          git rm -r --ignore-unmatch .
          cp -a /tmp/graz-pages/. .
          touch .nojekyll
          git add index.html .nojekyll
          git commit -m "Publish public viewer" || exit 0
          git push origin gh-pages
