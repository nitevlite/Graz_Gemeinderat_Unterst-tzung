name: publish public viewer

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/pages.yml"
      - "graz_protocols/**"
      - "requirements.txt"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build public data from DIGRA
        run: |
          mkdir -p public_work public
          python -m graz_protocols.cli digra-sync \
            --limit 60 \
            --output public_work/records.jsonl \
            --summary public_work/summary.json \
            --sqlite public_work/eintraege.sqlite \
            --city-archive-links

      - name: Add local summaries
        run: |
          python -m graz_protocols.cli summaries \
            --records public_work/records.jsonl \
            --output public_work/records_ai.jsonl

      - name: Build topics
        run: |
          python -m graz_protocols.cli topics \
            --records public_work/records_ai.jsonl \
            --output public_work/topics.json

      - name: Build static viewer
        run: |
          python -m graz_protocols.viewer \
            --records public_work/records_ai.jsonl \
            --summary public_work/summary.json \
            --topics public_work/topics.json \
            --output public/index.html
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
