name: checks

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Check git data safety
        run: python scripts/check_git_safety.py

      - name: Run tests
        run: python -m pytest
